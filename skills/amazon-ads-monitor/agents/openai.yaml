display_name: Amazon Ads Monitor
short_description: Produce and post the daily (T-1) and weekly (WoW) Amazon Ads performance briefs -- Sellerboard-vs-AdLabs cross-checked, goal-lens-aware, with trends/% changes and (weekly) Push/Pause-Optimize/Test proposals -- to Slack. Read-only.
default_prompt: Use this skill to run tools/amazon-ads-monitor/ and post the Amazon Ads brief to #amazon-daily-report. Daily (run_monitor.py): previous-day report from the Sellerboard "Dashboard Totals" CSV (file-first from _local/ads-monitor/inbox/<brand>/ with a firecrawl_scrape fallback), AdLabs cross-check via crosscheck.py, goal-lens-aware severity from the brand's goal profile, trends and % changes vs prior day and trailing-7-day average. Weekly (run_weekly.py): week-over-week headline via analyze.aggregate_week, plus three read-only proposal lists from recommendations.py (Push / Pause-Optimize / Test-only-if-pertinent) informed by AdLabs weekly campaign/target data and the _local/ads-signals digest. Falls back to mock/PREVIEW mode with no credentials. Never changes campaigns -- both briefs are read-only recommendations for operator approval.
